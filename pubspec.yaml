name: pomodoro_tasks
description: "Shared Pomodoro & Task accountability app with Bible quotes"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.0
  google_sign_in: ^6.2.1

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Functional Programming
  fpdart: ^1.1.0

  # Local Storage
  shared_preferences: ^2.3.4

  # HTTP
  http: ^1.4.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Media
  image_picker: ^1.1.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.10.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
