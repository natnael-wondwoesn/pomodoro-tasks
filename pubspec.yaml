name: pomodoro_tasks
description: "Shared Pomodoro & Task accountability app with Bible quotes"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Functional Programming
  fpdart: ^1.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP
  http: ^1.4.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.7.0
  build_runner: ^2.4.15
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
